name: Deploy TripTools to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'TripTools.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Upload TripTools.html via FTP
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            ftp://playologyentertainment.com <<'EOF'
          set ftp:ssl-allow yes
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 2
          set ftp:passive-mode yes
          mkdir -fp experiments/TripTools
          put TripTools.html -o experiments/TripTools/TripTools.html
          quit
          EOF
