name: Deploy GoTools to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'TripTools.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload TripTools.html via FTP
        run: |
          curl -T TripTools.html \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            --max-time 60 \
            --connect-timeout 15 \
            "ftp://ftp.playologyentertainment.com/experiments/TripTools/TripTools.html"
