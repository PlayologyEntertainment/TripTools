name: Deploy TripTools to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'TripTools.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload TripTools.html via SFTP
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P 22 \
            TripTools.html \
            "${{ secrets.FTP_USERNAME }}@playologyentertainment.com:public_html/experiments/TripTools/TripTools.html"
